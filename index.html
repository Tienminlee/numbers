<!doctype html>
<html lang="zh-TW" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Number Listening Practice</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&amp;display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Nunito', sans-serif; }
    @keyframes popIn { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    @keyframes shake { 0%,100% { transform: translateX(0); } 20%,60% { transform: translateX(-6px); } 40%,80% { transform: translateX(6px); } }
    @keyframes celebrate { 0% { transform: scale(1); } 50% { transform: scale(1.15); } 100% { transform: scale(1); } }
    .pop-in { animation: popIn 0.35s ease-out; }
    .shake { animation: shake 0.4s ease; }
    .celebrate { animation: celebrate 0.4s ease; }
    .option-btn { transition: all 0.2s ease; }
    .option-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(0,0,0,0.15); }
    .option-btn:active { transform: translateY(0); }
    .progress-fill { transition: width 0.5s ease; }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full">
  <div id="app" class="h-full w-full overflow-auto" style="background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);"><!-- Header -->
   <div class="text-center pt-8 pb-4 px-4">
    <h1 id="main-title" class="text-3xl md:text-4xl font-900 text-white tracking-tight">🎧 數字聽力練習</h1>
    <p class="text-slate-400 mt-2 text-sm">聽發音，選出正確的數字</p>
   </div><!-- Score & Progress -->
   <div class="max-w-md mx-auto px-6 mb-4">
    <div class="flex justify-between text-sm text-slate-400 mb-2"><span>第 <span id="q-current" class="text-amber-400 font-bold">1</span> / <span id="q-total" class="text-amber-400 font-bold">9</span> 題</span> <span>✅ <span id="score" class="text-emerald-400 font-bold">0</span></span>
    </div>
    <div class="w-full h-2 bg-slate-700 rounded-full overflow-hidden">
     <div id="progress-bar" class="progress-fill h-full bg-gradient-to-r from-amber-400 to-orange-500 rounded-full" style="width:0%"></div>
    </div>
   </div><!-- Play Area -->
   <div id="play-area" class="max-w-md mx-auto px-6"><!-- Play Button -->
    <div class="flex justify-center my-6"><button id="play-btn" onclick="playAudio()" class="w-24 h-24 rounded-full bg-gradient-to-br from-amber-400 to-orange-500 flex items-center justify-center shadow-lg shadow-amber-500/30 hover:shadow-amber-500/50 transition-all hover:scale-105 active:scale-95"> <i data-lucide="volume-2" style="width:40px;height:40px;color:#0f172a;stroke-width:2.5;"></i> </button>
    </div>
    <p class="text-center text-slate-500 text-xs mb-6">點擊上方按鈕聽發音</p><!-- Options -->
    <div id="options" class="grid grid-cols-2 gap-3 mb-6"></div><!-- Feedback -->
    <div id="feedback" class="text-center h-10 flex items-center justify-center"></div>
   </div><!-- Result Screen -->
   <div id="result-screen" class="hidden max-w-md mx-auto px-6 text-center py-10">
    <div class="text-6xl mb-4">
     🎉
    </div>
    <h2 class="text-2xl font-800 text-white mb-2">練習完成！</h2>
    <p class="text-slate-300 text-lg mb-1">你的成績：<span id="final-score" class="text-amber-400 font-bold"></span> / <span id="final-total" class="text-amber-400 font-bold"></span></p>
    <p id="final-msg" class="text-slate-400 mb-8"></p><button onclick="restartGame()" class="px-8 py-3 bg-gradient-to-r from-amber-400 to-orange-500 text-slate-900 font-bold rounded-xl hover:scale-105 transition-transform active:scale-95">再練一次</button>
   </div>
  </div>
  <script>
const NUMBERS = [
  { word: 'ten', value: 10, display: '10' },
  { word: 'twenty', value: 20, display: '20' },
  { word: 'thirty', value: 30, display: '30' },
  { word: 'forty', value: 40, display: '40' },
  { word: 'fifty', value: 50, display: '50' },
  { word: 'twenty-five', value: 25, display: '25' },
  { word: 'thirty-five', value: 35, display: '35' },
  { word: 'forty-five', value: 45, display: '45' },
  { word: 'fifty-five', value: 55, display: '55' }
];

let questions = [], currentQ = 0, score = 0, answered = false;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; }
  return a;
}

function speak(text) {
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US'; u.rate = 0.85; u.pitch = 1;
  window.speechSynthesis.speak(u);
}

function playAudio() {
  if (questions.length === 0) return;
  speak(questions[currentQ].word);
}

function generateOptions(correct) {
  const opts = [correct];
  const pool = NUMBERS.filter(n => n.value !== correct.value);
  const shuffled = shuffle(pool);
  for (let i = 0; opts.length < 4 && i < shuffled.length; i++) opts.push(shuffled[i]);
  return shuffle(opts);
}

function renderQuestion() {
  answered = false;
  const q = questions[currentQ];
  document.getElementById('q-current').textContent = currentQ + 1;
  document.getElementById('progress-bar').style.width = (currentQ / questions.length * 100) + '%';
  document.getElementById('feedback').innerHTML = '';

  const opts = generateOptions(q);
  const container = document.getElementById('options');
  container.innerHTML = '';
  opts.forEach(o => {
    const btn = document.createElement('button');
    btn.className = 'option-btn pop-in rounded-xl py-4 text-center font-bold text-lg border-2 border-slate-600 bg-slate-800 text-white';
    btn.innerHTML = `<div class="text-2xl font-900">${o.display}</div><div class="text-xs text-slate-400 mt-1">${o.word}</div>`;
    btn.onclick = () => checkAnswer(o, q, btn, container);
    container.appendChild(btn);
  });

  setTimeout(() => playAudio(), 400);
}

function checkAnswer(selected, correct, btn, container) {
  if (answered) return;
  answered = true;
  const isCorrect = selected.value === correct.value;

  [...container.children].forEach(b => {
    b.disabled = true;
    b.classList.remove('border-slate-600');
    const val = parseInt(b.querySelector('.text-2xl').textContent);
    if (val === correct.value) {
      b.classList.add('border-emerald-400', 'bg-emerald-900/40');
    } else if (b === btn && !isCorrect) {
      b.classList.add('border-red-400', 'bg-red-900/40', 'shake');
    } else {
      b.classList.add('border-slate-700', 'opacity-40');
    }
  });

  const fb = document.getElementById('feedback');
  if (isCorrect) {
    score++;
    document.getElementById('score').textContent = score;
    fb.innerHTML = '<span class="text-emerald-400 font-bold celebrate inline-block">✅ 正確！</span>';
  } else {
    fb.innerHTML = `<span class="text-red-400 font-bold">❌ 答案是 ${correct.display} (${correct.word})</span>`;
  }

  setTimeout(() => {
    currentQ++;
    if (currentQ < questions.length) {
      renderQuestion();
    } else {
      showResult();
    }
  }, 1500);
}

function showResult() {
  document.getElementById('play-area').classList.add('hidden');
  document.getElementById('result-screen').classList.remove('hidden');
  document.getElementById('progress-bar').style.width = '100%';
  document.getElementById('final-score').textContent = score;
  document.getElementById('final-total').textContent = questions.length;
  const pct = score / questions.length;
  document.getElementById('final-msg').textContent = pct === 1 ? '太厲害了！滿分！🌟' : pct >= 0.7 ? '表現很棒！繼續加油！💪' : '多練習幾次會更好喔！📚';
}

function restartGame() {
  currentQ = 0; score = 0;
  document.getElementById('score').textContent = 0;
  document.getElementById('result-screen').classList.add('hidden');
  document.getElementById('play-area').classList.remove('hidden');
  questions = shuffle(NUMBERS);
  document.getElementById('q-total').textContent = questions.length;
  renderQuestion();
}

// Element SDK
const defaultConfig = {
  main_title: '🎧 數字聽力練習',
  background_color: '#0f172a',
  surface_color: '#1e293b',
  text_color: '#ffffff',
  primary_action_color: '#f59e0b',
  secondary_action_color: '#94a3b8',
  font_family: 'Nunito',
  font_size: 16
};

window.elementSdk.init({
  defaultConfig,
  onConfigChange: async (config) => {
    const c = { ...defaultConfig, ...config };
    document.getElementById('main-title').textContent = c.main_title;
    const app = document.getElementById('app');
    app.style.background = `linear-gradient(135deg, ${c.background_color} 0%, ${c.surface_color} 50%, ${c.background_color} 100%)`;
    document.querySelectorAll('.option-btn').forEach(b => { b.style.backgroundColor = c.surface_color; });
    document.getElementById('main-title').style.color = c.text_color;
    document.getElementById('main-title').style.fontFamily = `${c.font_family}, Nunito, sans-serif`;
    const base = c.font_size || 16;
    document.getElementById('main-title').style.fontSize = `${base * 2}px`;
  },
  mapToCapabilities: (config) => ({
    recolorables: [
      { get: () => config.background_color || defaultConfig.background_color, set: v => { config.background_color = v; window.elementSdk.setConfig({ background_color: v }); } },
      { get: () => config.surface_color || defaultConfig.surface_color, set: v => { config.surface_color = v; window.elementSdk.setConfig({ surface_color: v }); } },
      { get: () => config.text_color || defaultConfig.text_color, set: v => { config.text_color = v; window.elementSdk.setConfig({ text_color: v }); } },
      { get: () => config.primary_action_color || defaultConfig.primary_action_color, set: v => { config.primary_action_color = v; window.elementSdk.setConfig({ primary_action_color: v }); } },
      { get: () => config.secondary_action_color || defaultConfig.secondary_action_color, set: v => { config.secondary_action_color = v; window.elementSdk.setConfig({ secondary_action_color: v }); } }
    ],
    borderables: [],
    fontEditable: { get: () => config.font_family || defaultConfig.font_family, set: v => { config.font_family = v; window.elementSdk.setConfig({ font_family: v }); } },
    fontSizeable: { get: () => config.font_size || defaultConfig.font_size, set: v => { config.font_size = v; window.elementSdk.setConfig({ font_size: v }); } }
  }),
  mapToEditPanelValues: (config) => new Map([
    ['main_title', config.main_title || defaultConfig.main_title]
  ])
});

// Start
questions = shuffle(NUMBERS);
document.getElementById('q-total').textContent = questions.length;
renderQuestion();
lucide.createIcons();
</script>
