<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>互動式數字聽力練習</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap');
        
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f0f4f8;
        }

        .number-card {
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .number-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .correct {
            background-color: #d1fae5 !important;
            border-color: #10b981 !important;
            color: #065f46 !important;
        }

        .wrong {
            background-color: #fee2e2 !important;
            border-color: #ef4444 !important;
            color: #991b1b !important;
        }

        .pulse-animation {
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .hidden-btn {
            display: none;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-10 px-4">

    <div class="max-w-2xl w-full bg-white rounded-3xl shadow-xl p-8">
        <h1 class="text-3xl font-bold text-center text-indigo-700 mb-2">數字聽力挑戰</h1>
        <p class="text-center text-gray-500 mb-6">點擊播放按鈕開始，或使用重複按鈕再聽一次</p>

        <!-- 計分板 -->
        <div class="grid grid-cols-2 gap-4 mb-8">
            <div class="bg-green-50 border border-green-200 rounded-2xl p-4 text-center">
                <p class="text-green-600 text-sm font-medium">正確</p>
                <p id="correctScore" class="text-3xl font-bold text-green-700">0</p>
            </div>
            <div class="bg-red-50 border border-red-200 rounded-2xl p-4 text-center">
                <p class="text-red-600 text-sm font-medium">錯誤</p>
                <p id="wrongScore" class="text-3xl font-bold text-red-700">0</p>
            </div>
        </div>

        <!-- 播放控制區 -->
        <div class="flex flex-col items-center justify-center bg-indigo-50 rounded-2xl p-8 mb-10 border-2 border-dashed border-indigo-200">
            <div class="flex items-center gap-6 mb-4">
                <!-- 再次發音按鈕 -->
                <button id="repeatBtn" class="bg-amber-500 hover:bg-amber-600 text-white p-4 rounded-full shadow-md transition-all active:scale-95 hidden-btn" title="再次發音">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                    </svg>
                </button>

                <!-- 主播放按鈕 -->
                <button id="playBtn" class="bg-indigo-600 hover:bg-indigo-700 text-white p-6 rounded-full shadow-lg transition-all active:scale-95">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z" />
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                </button>
            </div>
            <p id="statusHint" class="text-indigo-800 font-medium">點擊播放按鈕開始測驗</p>
        </div>

        <!-- 數字選項區 -->
        <div class="grid grid-cols-2 sm:grid-cols-3 gap-4" id="optionsGrid">
            <!-- 由 JavaScript 動態生成 -->
        </div>

        <!-- 回饋訊息 -->
        <div id="feedback" class="mt-8 text-center text-xl font-bold h-8 transition-opacity duration-300 opacity-0">
            答對了！
        </div>

        <!-- 重新開始 -->
        <div class="mt-8 flex justify-center">
            <button id="resetBtn" class="text-indigo-600 hover:text-indigo-800 underline font-medium">
                重新開始挑戰並清空分數
            </button>
        </div>
    </div>

    <script>
        const numbers = [
            "ten", "twenty", "thirty", "forty", "fifty",
            "twenty-five", "thirty-five", "forty-five", "fifty-five"
        ];

        let currentTarget = "";
        let isPlaying = false;
        let canGuess = false;
        let score = { correct: 0, wrong: 0 };

        const playBtn = document.getElementById('playBtn');
        const repeatBtn = document.getElementById('repeatBtn');
        const statusHint = document.getElementById('statusHint');
        const optionsGrid = document.getElementById('optionsGrid');
        const feedback = document.getElementById('feedback');
        const resetBtn = document.getElementById('resetBtn');
        const correctScoreEl = document.getElementById('correctScore');
        const wrongScoreEl = document.getElementById('wrongScore');

        // 初始化選項
        function initOptions() {
            optionsGrid.innerHTML = '';
            numbers.forEach(num => {
                const button = document.createElement('div');
                button.className = 'number-card bg-white border-2 border-gray-200 rounded-xl p-4 text-center font-bold text-gray-700 text-lg';
                button.textContent = num;
                button.dataset.value = num;
                button.onclick = () => checkAnswer(num, button);
                optionsGrid.appendChild(button);
            });
        }

        // 更新分數顯示
        function updateScoreDisplay() {
            correctScoreEl.textContent = score.correct;
            wrongScoreEl.textContent = score.wrong;
        }

        // 隨機選一個數字
        function pickNewTarget() {
            const lastTarget = currentTarget;
            do {
                currentTarget = numbers[Math.floor(Math.random() * numbers.length)];
            } while (currentTarget === lastTarget);
            repeatBtn.classList.remove('hidden-btn'); 
        }

        // 播放語音
        function speak(text, isRepeat = false) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'en-US';
                utterance.rate = 0.8;
                
                utterance.onstart = () => {
                    isPlaying = true;
                    if (isRepeat) {
                        repeatBtn.classList.add('pulse-animation');
                    } else {
                        playBtn.classList.add('pulse-animation');
                    }
                    statusHint.textContent = isRepeat ? '正在重新朗讀...' : '正在朗讀新題目...';
                };

                utterance.onend = () => {
                    isPlaying = false;
                    canGuess = true;
                    playBtn.classList.remove('pulse-animation');
                    repeatBtn.classList.remove('pulse-animation');
                    statusHint.textContent = '請從下方選擇正確的數字';
                };

                window.speechSynthesis.speak(utterance);
            }
        }

        // 檢查答案
        function checkAnswer(selected, element) {
            if (!canGuess || isPlaying) return;

            if (selected === currentTarget) {
                // 答對邏輯
                score.correct++;
                updateScoreDisplay();
                element.classList.add('correct');
                feedback.textContent = '答對了！太棒了！';
                feedback.className = 'mt-8 text-center text-xl font-bold h-8 text-green-600 opacity-100';
                canGuess = false;
                statusHint.textContent = '答對囉！點擊播放新題目';
                
                setTimeout(() => {
                    resetCards();
                }, 1500);
            } else {
                // 答錯邏輯
                if (!element.classList.contains('wrong')) {
                    score.wrong++;
                    updateScoreDisplay();
                }
                element.classList.add('wrong');
                feedback.textContent = '不對喔，再試一次！';
                feedback.className = 'mt-8 text-center text-xl font-bold h-8 text-red-600 opacity-100';
                
                setTimeout(() => {
                    element.classList.remove('wrong');
                    feedback.className = 'mt-8 text-center text-xl font-bold h-8 transition-opacity duration-300 opacity-0';
                }, 1000);
            }
        }

        function resetCards() {
            const allCards = document.querySelectorAll('.number-card');
            allCards.forEach(card => {
                card.className = 'number-card bg-white border-2 border-gray-200 rounded-xl p-4 text-center font-bold text-gray-700 text-lg';
            });
            feedback.className = 'mt-8 text-center text-xl font-bold h-8 transition-opacity duration-300 opacity-0';
        }

        // 播放新題目
        playBtn.onclick = () => {
            if (!isPlaying) {
                pickNewTarget();
                speak(currentTarget, false);
            }
        };

        // 再次播放同一題
        repeatBtn.onclick = () => {
            if (!isPlaying && currentTarget) {
                speak(currentTarget, true);
            }
        };

        resetBtn.onclick = () => {
            currentTarget = "";
            canGuess = false;
            isPlaying = false;
            score = { correct: 0, wrong: 0 };
            updateScoreDisplay();
            repeatBtn.classList.add('hidden-btn');
            initOptions();
            statusHint.textContent = '點擊播放按鈕開始測驗';
            feedback.className = 'mt-8 text-center text-xl font-bold h-8 transition-opacity duration-300 opacity-0';
        };

        initOptions();
    </script>
</body>
</html>
